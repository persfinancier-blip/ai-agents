name: Claude Worker

on:
  issues:
    types: [labeled]
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]
  push:
    branches: ['task/**']

jobs:
  claude-issue:
    if: github.event_name == 'issues' && github.event.label.name == 'ai-task'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    concurrency:
      group: claude-${{ github.event.issue.number }}
      cancel-in-progress: false
    permissions:
      contents: write
      pull-requests: write
      issues: write
      id-token: write
      actions: read
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          claude_args: "--max-turns 40"
          prompt: |
            Read this issue and implement it following CLAUDE.md and .claude/rules/.
            Work on a feature branch off main. Satisfy the DoD for the touched zone
            (backend: ruff check, ruff format --check, python -m mypy app, pytest;
            frontend: npm run lint, npm run build). Open a PR that references the
            issue (Closes #N) and post a short summary comment on the issue in Russian.

      - name: Dead-run alarm (issue path)
        if: failure() || cancelled()
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.payload.issue.number,
              body: `⚠️ Исполнитель не завершил задачу (лимиты/сбой). Ссылка на запуск: ${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`
            });

  claude-task-push:
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/heads/task/')
    runs-on: ubuntu-latest
    timeout-minutes: 30
    concurrency:
      group: claude-${{ github.ref }}
      cancel-in-progress: false
    permissions:
      contents: write
      pull-requests: write
      issues: write
      id-token: write
      actions: read
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          claude_args: "--max-turns 40"
          prompt: |
            This branch was created by the task dispatcher: its latest commit adds
            exactly one task prompt file under prompts/ (not in _done). Find it via
            `git log -1 --name-only`, read it, and execute it following CLAUDE.md and
            .claude/rules/. Use THIS branch as the working branch (rename is not
            needed). Satisfy the DoD for the touched zone. Move the prompt file to
            prompts/_done/ in the same work. Open a PR to main titled per the prompt,
            and leave it open for owner review.

      - name: Dead-run alarm (task push path)
        if: failure() || cancelled()
        uses: actions/github-script@v7
        with:
          script: |
            const branch = context.ref.replace('refs/heads/', '');
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `Worker failed: ${branch}`,
              body: `⚠️ Исполнитель не завершил задачу (лимиты/сбой).\n\nВетка: \`${branch}\`\nСсылка на запуск: ${runUrl}`,
              labels: ['worker-failure']
            });

  claude-comment:
    if: |
      (github.event_name == 'issue_comment' && contains(github.event.comment.body, '@claude')) ||
      (github.event_name == 'pull_request_review_comment' && contains(github.event.comment.body, '@claude'))
    runs-on: ubuntu-latest
    timeout-minutes: 30
    concurrency:
      group: claude-${{ github.event.issue.number || github.event.pull_request.number }}
      cancel-in-progress: false
    permissions:
      contents: write
      pull-requests: write
      issues: write
      id-token: write
      actions: read
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          claude_args: "--max-turns 40"

      - name: Dead-run alarm (comment path)
        if: failure() || cancelled()
        uses: actions/github-script@v7
        with:
          script: |
            const issueNumber = context.payload.issue ? context.payload.issue.number : context.payload.pull_request.number;
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: issueNumber,
              body: `⚠️ Исполнитель не завершил задачу (лимиты/сбой). Ссылка на запуск: ${runUrl}`
            });
